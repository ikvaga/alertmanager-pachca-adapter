# Локальная конфигурация Alertmanager для docker-compose:
# алерты уходят в alertmanager-pachka-router по внутреннему DNS Docker.
#
# Повторные сообщения в Пачку «через несколько минут» обычно делает сам
# Alertmanager, а не роутер:
# - repeat_interval — повторная отправка той же группы пока алерт firing;
# - group_interval — повтор при изменении состава группы после первого уведомления.
# Подстройте интервалы под политику эскалации или задайте их в «боевом» Alertmanager.

global:
  resolve_timeout: 5m

route:
  receiver: pachka-router
  group_wait: 0s
  group_interval: 1m
  repeat_interval: 4h

receivers:
  - name: pachka-router
    webhook_configs:
      - url: http://alertmanager-pachka-router:8080/alertmanager/webhook
        send_resolved: true
