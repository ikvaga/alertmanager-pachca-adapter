# Требуется Prometheus Operator (CRD monitoring.coreos.com/v1).
# Не включён в kustomization.yaml, чтобы `kubectl apply -k k8s/` работал без CRD.
# Применение вручную:
#   kubectl apply -f k8s/servicemonitor.yaml
#
# Добавьте в metadata.labels те же селекторы, что ожидает ваш Prometheus
# (часто release: kube-prometheus-stack).

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: alertmanager-pachka-router
  labels:
    app: alertmanager-pachka-router
spec:
  selector:
    matchLabels:
      app: alertmanager-pachka-router
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
